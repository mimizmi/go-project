server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history mode (hash mode 不需要，但保留兼容)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到 FHIR Gateway 后端
    location /api/ {
        proxy_pass http://fhir-server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
